name: Daily data refresh

on:
  schedule:
    - cron: "20 5 * * *"   # 05:20 UTC daily (06:20/07:20 UK, 07:20/08:20 Paris)
  workflow_dispatch:
    inputs:
      since:
        description: "Fetch window start (YYYY-MM-DD). Leave blank for automatic."
        required: false
        default: ""
      limit:
        description: "Max BDIF records to pull"
        required: false
        default: "500"

permissions:
  contents: write

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install pypdf openpyxl

      - name: Fetch, parse and rebuild
        run: |
          python pipeline/refresh.py --since "${{ inputs.since }}" --limit "${{ inputs.limit || '500' }}"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html pipeline/state
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Data refresh $(date -u +%Y-%m-%d)"
            git push
          fi
